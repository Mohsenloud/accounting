<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود - حسابداری شخصی</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * { font-family: 'Vazirmatn', Tahoma, Arial, sans-serif; }
        body {
            background: linear-gradient(135deg, #0078D7 0%, #005A9E 50%, #003F7F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: linear-gradient(135deg, #0078D7 0%, #005A9E 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .login-header i { font-size: 3rem; margin-bottom: 1rem; display: block; }
        .login-header h3 { margin: 0; font-weight: bold; }
        .login-header p { margin: 0.5rem 0 0; opacity: 0.8; font-size: 0.9rem; }
        .login-body { padding: 2rem; }
        .form-control {
            border-radius: 12px;
            padding: 0.8rem 1rem;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #0078D7;
            box-shadow: 0 0 0 3px rgba(0,120,215,0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #0078D7 0%, #005A9E 100%);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,120,215,0.4);
            color: white;
        }
        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-calculator"></i>
            <h3>حسابداری شخصی</h3>
            <p>برای دسترسی وارد شوید</p>
        </div>
        <div class="login-body">
            {% if error %}
            <div class="alert alert-danger text-center">
                <i class="bi bi-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">رمز عبور:</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" class="form-control" id="password" 
                               placeholder="رمز عبور را وارد کنید..." required autofocus>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-left"></i> ورود
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            var input = document.getElementById('password');
            var icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
